<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email App</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="m-0 h-screen font-sans flex">
    <div class="flex flex-col flex-1">
      <!-- HEADER -->
      <div
        class="bg-white px-5 py-2 border-b border-gray-300 flex items-center justify-between"
      >
        <h2 class="text-xl">Email App</h2>
        <input
          id="searchInput"
          type="text"
          placeholder="Search Mail..."
          class="w-72 px-3 py-1.5 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
        <button
          id="btnSearch"
          class="px-4 py-1.5 bg-blue-500 text-white rounded-md hover:bg-blue-600 transition"
        >
          Tìm kiếm
        </button>
      </div>
      <!-- CONTENT -->
      <div class="p-5 bg-gray-100 overflow-y-auto flex-1">
        <!-- LIST EMAIL -->
        {% for email in emailObj%}
        <div class="bg-white border-b border-gray-300 p-3 mb-3 rounded-md flex justify-between">
          <a href="{% url 'detail_email' email.id %}"
            class="class="max-w-[70%]"
          >
            <div class="font-bold">{{ email.title }}</div>
            <div class="text-gray-800">{{ email.description }}</div>
            <div class="text-gray-600">
              {% if email.status %}
              <div>Đã xem</div>
              {% else %}
              <div>Chưa xem</div>
              {% endif %}
            </div>
            <form method="POST" action="{% url        'delete_email' email_id%}">
              {% csrk_token %}
            </form>
            <button type="submit" class="text-red-600 border border-red-600 px-3 py-1 rounded-md hover:bg-red-600 hover:text-white text-sm" onclick="return confirm('Do you want to remove email')"></button>
          </a>
          <div class="text-sm text-gray-500">{{ email.time }}</div>
        </div>
        {% endfor %}
      </div>
    </div>
  </body>
</html>

<script>
  document.getElementById("btnSearch").addEventListener("click", () => {
    const query = document.getElementById("searchInput").value;
    window.location.href = `/?q=${encodeURIComponent(query)}`;
  });
</script>
